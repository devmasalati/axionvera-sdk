<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axionvera SDK Browser Sandbox</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 30px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .connect-btn {
      background: #667eea;
      color: white;
    }

    .connect-btn:hover {
      background: #5568d3;
    }

    .connect-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .send-btn {
      background: #764ba2;
      color: white;
    }

    .send-btn:hover {
      background: #633d91;
    }

    .send-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .logs {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #d4d4d4;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .log-entry {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-success {
      color: #4ec9b0;
    }

    .log-error {
      color: #f48771;
    }

    .log-info {
      color: #9cdcfe;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.connected {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Axionvera SDK Browser Sandbox</h1>
    <p class="subtitle">Test the SDK without local setup using MockWalletConnector</p>
    
    <div class="button-group">
      <button id="connectBtn" class="connect-btn">Connect Wallet</button>
      <button id="sendBtn" class="send-btn" disabled>Send Transaction</button>
    </div>

    <div id="status" class="status"></div>

    <div class="logs" id="logs">
      <div class="log-entry log-info">Initializing SDK...</div>
    </div>
  </div>

  <script type="module" src="/index.ts"></script>
</body>
</html>
